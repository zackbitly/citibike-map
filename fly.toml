# fly.toml — generated for citibike-map
app = "citibike-map"
primary_region = "ewr"  # Newark, NJ — closest to NYC

[build]

[env]
  PORT = "8080"
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source = "citibike_data"
  destination = "/data"
